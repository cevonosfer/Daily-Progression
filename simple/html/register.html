<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
</head>
<body>
  <h2>Register</h2>

  <input type="text" id="name" placeholder="Full Name" /><br><br>
  <input type="email" id="email" placeholder="Email" /><br><br>
  <input type="number" id="age" placeholder="Age" /><br><br>
  <input type="text" id="username" placeholder="Username (max 15 chars)" maxlength="15" /><br><br>
  <input type="password" id="password" placeholder="Password" /><br><br>
  <small>Password must be 8+ chars with uppercase, lowercase, number and special character (#?!@$%^&*-)</small><br><br>
  <button onclick="register()">Register</button>

  <p id="msg"></p>

  <a href="login.html">Already have an account? Login</a>

  <script src="../js/register.js"></script>
</body>
</html>
